name: Main Post-Merge Smoke

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-post-merge-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.19.0"
  VITE_SUPABASE_URL: "https://example.supabase.co"
  VITE_SUPABASE_ANON_KEY: "ci-anon-key"
  VITE_SUPABASE_REDIRECT_URL: "https://hushhtech.com/auth/callback"
  VITE_PLAID_REDIRECT_URI: "https://hushhtech.com/onboarding/financial-link"
  VITE_ALLOW_INSECURE_BROWSER_LLM: "false"

jobs:
  smoke-gate:
    name: Main Post-Merge Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build green main artifact
        run: npm run build:web

      - name: Run compact smoke suite
        env:
          SMOKE_REPORT_PATH: /tmp/ci/main-post-merge-smoke.json
        run: bash scripts/ci/orchestrate.sh smoke

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-post-merge-smoke
          if-no-files-found: error
          path: /tmp/ci/main-post-merge-smoke.json
