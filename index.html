    <!-- 🔧 iOS Debug Console - Pure vanilla JS, runs BEFORE React loads -->
    <!-- Activate: Always on when this script is present. Remove after debugging. -->
    <script>
    (function() {
      // ===== HUSHH iOS DEBUG CONSOLE =====
      // Pure vanilla JS - zero dependencies - works even if React crashes
      
      var logs = [];
      var maxLogs = 200;
      var isMinimized = false;
      var panel = null;
      var logContainer = null;
      var badge = null;
      var errorCount = 0;
      var warnCount = 0;

      // Save original console methods
      var origLog = console.log;
      var origWarn = console.warn;
      var origError = console.error;
      var origInfo = console.info;
      var origDebug = console.debug;

      // Helper: stringify any value safely
      function safeStringify(val) {
        if (val === undefined) return 'undefined';
        if (val === null) return 'null';
        if (typeof val === 'string') return val;
        if (val instanceof Error) return val.message + '\n' + (val.stack || '');
        try { return JSON.stringify(val, null, 2); } 
        catch(e) { return String(val); }
      }

      // Helper: format args
      function formatArgs(args) {
        return Array.prototype.map.call(args, safeStringify).join(' ');
      }

      // Helper: get timestamp
      function timestamp() {
        var d = new Date();
        return d.getHours().toString().padStart(2,'0') + ':' + 
               d.getMinutes().toString().padStart(2,'0') + ':' + 
               d.getSeconds().toString().padStart(2,'0') + '.' +
               d.getMilliseconds().toString().padStart(3,'0');
      }

      // Add log entry
      function addLog(type, message) {
        var entry = { type: type, message: message, time: timestamp() };
        logs.push(entry);
        if (logs.length > maxLogs) logs.shift();
        if (type === 'error') errorCount++;
        if (type === 'warn') warnCount++;
        renderLogs();
      }

      // Intercept console methods
      console.log = function() {
        origLog.apply(console, arguments);
        addLog('log', formatArgs(arguments));
      };
      console.info = function() {
        origInfo.apply(console, arguments);
        addLog('info', formatArgs(arguments));
      };
      console.warn = function() {
        origWarn.apply(console, arguments);
        addLog('warn', formatArgs(arguments));
      };
      console.error = function() {
        origError.apply(console, arguments);
        addLog('error', formatArgs(arguments));
      };
      console.debug = function() {
        origDebug.apply(console, arguments);
        addLog('debug', formatArgs(arguments));
      };

      // Catch uncaught errors
      window.addEventListener('error', function(event) {
        addLog('error', '🔴 UNCAUGHT: ' + event.message + 
          '\n   File: ' + (event.filename || 'unknown') + 
          '\n   Line: ' + (event.lineno || '?') + ':' + (event.colno || '?') +
          (event.error && event.error.stack ? '\n   Stack: ' + event.error.stack : ''));
      });

      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        var msg = '🔴 PROMISE REJECTED: ';
        if (reason instanceof Error) {
          msg += reason.message + (reason.stack ? '\n   Stack: ' + reason.stack : '');
        } else {
          msg += safeStringify(reason);
        }
        addLog('error', msg);
      });

      // Color map
      var colors = {
        log: '#e0e0e0',
        info: '#64b5f6',
        warn: '#ffb74d',
        error: '#ef5350',
        debug: '#90a4ae'
      };

      var bgColors = {
        log: 'transparent',
        info: 'rgba(100,181,246,0.08)',
        warn: 'rgba(255,183,77,0.12)',
        error: 'rgba(239,83,80,0.15)',
        debug: 'transparent'
      };

      var labels = {
        log: 'LOG',
        info: 'INF',
        warn: 'WRN',
        error: 'ERR',
        debug: 'DBG'
      };

      // Render logs into panel
      function renderLogs() {
        if (!logContainer) return;
        
        // Build HTML
        var html = '';
        for (var i = 0; i < logs.length; i++) {
          var entry = logs[i];
          html += '<div style="padding:4px 8px;border-bottom:1px solid #2a2a2a;background:' + bgColors[entry.type] + ';font-size:12px;line-height:1.4;word-break:break-word;">' +
            '<span style="color:#666;font-size:10px;margin-right:6px;">' + entry.time + '</span>' +
            '<span style="color:#000;background:' + colors[entry.type] + ';padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700;margin-right:6px;">' + labels[entry.type] + '</span>' +
            '<span style="color:' + colors[entry.type] + ';white-space:pre-wrap;">' + escapeHtml(entry.message) + '</span>' +
            '</div>';
        }
        logContainer.innerHTML = html;
        
        // Auto-scroll to bottom
        logContainer.scrollTop = logContainer.scrollHeight;

        // Update badge
        if (badge) {
          if (errorCount > 0) {
            badge.textContent = errorCount + ' err';
            badge.style.background = '#ef5350';
          } else if (warnCount > 0) {
            badge.textContent = warnCount + ' wrn';
            badge.style.background = '#ffb74d';
          } else {
            badge.textContent = logs.length;
            badge.style.background = '#4caf50';
          }
        }
      }

      // Escape HTML
      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // Build the console UI once DOM is ready
      function buildConsole() {
        // Main panel
        panel = document.createElement('div');
        panel.id = 'hushh-debug-console';
        panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:999999;font-family:SF Mono,Menlo,Monaco,Consolas,monospace;';
        
        // Header bar
        var header = document.createElement('div');
        header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;background:#1a1a2e;padding:8px 12px;border-top:2px solid #0ea5e9;cursor:pointer;-webkit-user-select:none;user-select:none;';
        header.innerHTML = '<div style="display:flex;align-items:center;gap:8px;">' +
          '<span style="font-size:14px;">🔧</span>' +
          '<span style="color:#0ea5e9;font-size:13px;font-weight:600;">Hushh iOS Debug</span>' +
          '<span id="hushh-debug-badge" style="color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#4caf50;">0</span>' +
          '</div>' +
          '<div style="display:flex;gap:8px;">' +
          '<button id="hushh-debug-clear" style="background:#333;color:#aaa;border:none;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;">Clear</button>' +
          '<button id="hushh-debug-copy" style="background:#333;color:#aaa;border:none;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;">Copy All</button>' +
          '<button id="hushh-debug-toggle" style="background:none;color:#aaa;border:none;font-size:16px;cursor:pointer;padding:4px;">▼</button>' +
          '</div>';
        
        // Log container
        logContainer = document.createElement('div');
        logContainer.id = 'hushh-debug-logs';
        logContainer.style.cssText = 'max-height:45vh;overflow-y:auto;background:#111;-webkit-overflow-scrolling:touch;';
        
        // System info bar
        var sysBar = document.createElement('div');
        sysBar.style.cssText = 'background:#1a1a2e;padding:4px 12px;font-size:10px;color:#666;border-top:1px solid #222;';
        var ua = navigator.userAgent;
        var isIOS = /iPad|iPhone|iPod/.test(ua);
        var safariMatch = ua.match(/Version\/([\d.]+)/);
        var webkitMatch = ua.match(/AppleWebKit\/([\d.]+)/);
        sysBar.textContent = (isIOS ? '🍎 iOS' : '📱 Android') + 
          ' | Safari ' + (safariMatch ? safariMatch[1] : 'N/A') +
          ' | WebKit ' + (webkitMatch ? webkitMatch[1] : 'N/A') +
          ' | ' + window.innerWidth + 'x' + window.innerHeight +
          ' | DPR ' + window.devicePixelRatio;

        panel.appendChild(header);
        panel.appendChild(logContainer);
        panel.appendChild(sysBar);
        document.body.appendChild(panel);

        // Get references
        badge = document.getElementById('hushh-debug-badge');
        
        // Toggle minimize
        var toggleBtn = document.getElementById('hushh-debug-toggle');
        header.addEventListener('click', function(e) {
          if (e.target.id === 'hushh-debug-clear' || e.target.id === 'hushh-debug-copy') return;
          isMinimized = !isMinimized;
          logContainer.style.display = isMinimized ? 'none' : 'block';
          sysBar.style.display = isMinimized ? 'none' : 'block';
          toggleBtn.textContent = isMinimized ? '▲' : '▼';
        });

        // Clear button
        document.getElementById('hushh-debug-clear').addEventListener('click', function(e) {
          e.stopPropagation();
          logs = [];
          errorCount = 0;
          warnCount = 0;
          renderLogs();
        });

        // Copy all button
        document.getElementById('hushh-debug-copy').addEventListener('click', function(e) {
          e.stopPropagation();
          var text = logs.map(function(l) {
            return '[' + l.time + '] [' + l.type.toUpperCase() + '] ' + l.message;
          }).join('\n');
          
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
              addLog('info', '📋 Copied ' + logs.length + ' log entries to clipboard');
            });
          } else {
            // Fallback for iOS
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px;';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            addLog('info', '📋 Copied ' + logs.length + ' log entries to clipboard');
          }
        });

        // Render existing logs
        renderLogs();
      }

      // Build console as soon as DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', buildConsole);
      } else {
        buildConsole();
      }

      // Log startup info
      addLog('info', '🔧 Hushh iOS Debug Console Active');
      addLog('info', '📱 UA: ' + navigator.userAgent);
      addLog('info', '🌐 URL: ' + window.location.href);
      addLog('info', '📐 Screen: ' + screen.width + 'x' + screen.height + ' | Viewport: ' + window.innerWidth + 'x' + window.innerHeight);
      addLog('info', '⏱ Waiting for React to mount...');
      
      // Track if React root mounts
      var reactMountCheck = setInterval(function() {
        var root = document.getElementById('root');
        if (root && root.childNodes.length > 0) {
          addLog('info', '✅ React mounted! Root has ' + root.childNodes.length + ' child nodes');
          clearInterval(reactMountCheck);
        }
      }, 500);

      // Timeout warning if React doesn't mount
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.childNodes.length === 0) {
          addLog('error', '⏰ React has NOT mounted after 10 seconds! This is likely the blank screen issue.');
          addLog('error', '📋 Check errors above for the root cause.');
        }
        clearInterval(reactMountCheck);
      }, 10000);

    })();
    </script>
